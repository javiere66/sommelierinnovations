<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<title>Palapa Bar · QR del Menú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #F3F6FA;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    gap: 1rem;
  }
  img.qr {
    width: 100%;
    max-width: 26rem;
    height: auto;
    display: block;
  }
  .hint { font-size: .8rem; color: #7A8292; text-align: center; }
  @media print {
    body { background: #fff; padding: 0; }
    .hint { display: none; }
  }
</style>
</head>
<body>
  <img class="qr" src="assets/menu-qr.jpg" alt="Menú – Palapa Bar. Escanea el código QR para ver el menú.">
  <p class="hint">Imprime esta página (Ctrl/Cmd&nbsp;+&nbsp;P) para ponerla en las mesas.</p>
</body>
</html>
