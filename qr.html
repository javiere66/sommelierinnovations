<title>Palapa Bar · QR del Menú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #FDF8F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    gap: 1rem;
  }
  .tent {
    background: #fff;
    border: 3px solid #FF0080;
    border-radius: 1rem;
    padding: 2rem 2.5rem;
    text-align: center;
    max-width: 24rem;
    width: 100%;
    box-shadow: 0 4px 16px rgba(1,51,105,.12);
  }
  .tent .palm { font-size: 2rem; }
  .tent h1 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    color: #013369;
    font-size: 1.8rem;
    letter-spacing: .04em;
  }
  .tent p.sub {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: .2em;
    font-size: .75rem;
    color: #FF0080;
    margin-bottom: 1.25rem;
  }
  .tent svg { width: 100%; max-width: 16rem; height: auto; display: block; margin: 0 auto; }
  .tent p.scan {
    margin-top: 1.25rem;
    font-weight: 600;
    color: #013369;
    font-size: 1.05rem;
  }
  .tent p.url { font-size: .75rem; color: #5b6472; margin-top: .35rem; word-break: break-all; }
  .hint { font-size: .8rem; color: #5b6472; text-align: center; }
  @media print {
    body { background: #fff; }
    .hint { display: none; }
    .tent { box-shadow: none; }
  }
</style>
</head>
