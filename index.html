<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Sommelier Innovations — menús digitales de nuestros bares. Escanea, explora y disfruta.">
<meta name="theme-color" content="#013369">
<title>Sommelier Innovations · Menús</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #013369;
    --blue: #2C5FA8;
    --pink: #FF0080;
    --sand: #FDF8F0;
    --ink: #1c2430;
    --line: #e8e2d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--sand);
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }
  header {
    background-image: linear-gradient(160deg, #013369 0%, #14498c 60%, #2C5FA8 100%);
    color: #fff;
    text-align: center;
    padding: 3rem 1.25rem 2.5rem;
  }
  header .mark { font-size: 2.25rem; line-height: 1; }
  header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(1.9rem, 8vw, 2.8rem);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-top: .35rem;
  }
  header p {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: .22em;
    font-size: .78rem;
    color: #ffd9ec;
    margin-top: .5rem;
  }
  main { max-width: 46rem; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
  h2.section {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    color: var(--blue);
    font-size: 1.15rem;
    letter-spacing: .03em;
    border-bottom: 3px solid var(--pink);
    padding-bottom: .4rem;
    margin-bottom: 1.25rem;
  }
  .bars { display: grid; grid-template-columns: 1fr; gap: 1rem; }
  @media (min-width: 40rem) { .bars { grid-template-columns: 1fr 1fr; } }
  a.bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: #fff;
    border: 1px solid var(--line);
    border-left: 5px solid var(--pink);
    border-radius: .7rem;
    padding: 1.15rem 1.25rem;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 3px rgba(28,36,48,.06);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  a.bar:hover, a.bar:active { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(1,51,105,.14); }
  a.bar .emoji { font-size: 2rem; line-height: 1; }
  a.bar .txt h3 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    color: var(--navy);
    font-size: 1.2rem;
    letter-spacing: .02em;
  }
  a.bar .txt p { font-size: .88rem; color: #5b6472; margin-top: .15rem; }
  a.bar .arrow { margin-left: auto; color: var(--pink); font-size: 1.4rem; font-weight: 700; }
  footer { text-align: center; padding: 1rem 1.25rem 2.5rem; color: #5b6472; font-size: .8rem; }
  footer .heart { color: var(--pink); }
</style>
</head>
<body>

<header>
  <div class="mark" aria-hidden="true">🍸</div>
  <h1>Sommelier Innovations</h1>
  <p>Menús Digitales</p>
</header>

<main>
  <h2 class="section">Nuestros Bares</h2>
  <div class="bars">
    <a class="bar" href="bars/palapa-bar/">
      <span class="emoji" aria-hidden="true">🌴</span>
      <span class="txt">
        <h3>Palapa Bar</h3>
        <p>Coctelería, cervezas, sin alcohol y botanas</p>
      </span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
    <!-- Para agregar otro bar, copia este bloque y cambia el enlace, el emoji y el texto. -->
  </div>
</main>

<footer>
  <p>Hecho con <span class="heart">♥</span> por Sommelier Innovations</p>
</footer>

</body>
</html>
